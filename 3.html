<!DOCTYPE html>
<html>
<head>
<title>Dream Homes</title>
<style>
body{
margin:0;
font-family:Arial;
}
header{
background:#1b263b;
color:white;
padding:20px;
text-align:center;
}
.hero{
background:linear-gradient(135deg,#415a77,#778da9);
color:white;
padding:120px;
text-align:center;
}
.properties{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:40px;
}
.card{
padding:20px;
background:white;
box-shadow:0 0 10px lightgray;
}
</style>
</head>
<body>

<header>
<h1>Dream Homes Realty</h1>
</header>

<div class="hero">
<h1>Find Your Perfect Home</h1>
<p>Luxury Properties Across India</p>
</div>

<div class="properties">
<div class="card">Villa - ₹1.2 Cr</div>
<div class="card">Apartment - ₹65 Lakh</div>
<div class="card">Farm House - ₹2 Cr</div>
</div>

</body>
</html>
